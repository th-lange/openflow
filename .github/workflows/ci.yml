name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify committed dist/ is in sync with src/
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            exit 1
          fi
